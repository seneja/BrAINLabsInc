<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Security Meta Tags (fallback for local dev; production uses _headers via Cloudflare) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- SEO Meta Tags -->
  <title>BrAIN Labs - Braininspired AI and Neuroinformatics Lab</title>
  <meta name="description"
    content="BrAIN Labs - Braininspired AI and Neuroinformatics Lab. We explore the intersection of Artificial Intelligence, Machine Learning, and Neuroscience to develop innovative AI solutions." />
  <meta name="keywords"
    content="AI research, machine learning, neuroscience, neuromorphic computing, LLM, spiking neural networks, computational neuroscience, BrAIN Labs" />
  <meta name="author" content="BrAIN Labs" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="BrAIN Labs | Brain-Inspired AI Research" />
  <meta property="og:description"
    content="BrAIN Labs - Braininspired AI and Neuroinformatics Lab. Exploring AI, ML, and Neuroscience to develop explainable and efficient AI systems." />
  <meta property="og:type" content="website" />

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BrAIN Labs | Brain-Inspired AI Research" />
  <meta name="twitter:description" content="BrAIN Labs - Braininspired AI and Neuroinformatics Lab." />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BrAIN Labs Inc",
      "url": "https://brainlabsinc.org",
      "logo": "https://brainlabsinc.org/logo.png",
      "sameAs": [
        "https://github.com/brainlabsinc"
      ]
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
